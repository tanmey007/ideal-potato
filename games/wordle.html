<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wordle | Aayushi's Birthday Edition 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/wordle.css" />
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
<div class="game-shell">
  <header class="game-header">
    <a href="../index.html" class="back-link">← Back</a>
    <h1>Wordle #2403</h1>
    <div style="width:48px"></div>
  </header>

  <div class="game-body">
    <div class="hint-box">
      <strong>Today's theme:</strong>
      [It is someone or something you love, but is not close to you every time.]
    </div>
    <div class="board" id="board"></div>
    <div class="keyboard" id="keyboard"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">🎉</h2>
    <p id="modal-body"></p>
    <button class="btn" onclick="document.getElementById('modal').classList.remove('show')">Close</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  ✏️  EDIT THESE:
// ════════════════════════════════════════════════
const ANSWER = "PALAK";
const WIN_MESSAGE = "After Popeye, you are the second person I know who loves spinach so much. Also you love Palak.";

// ════════════════════════════════════════════════
//  Game logic
// ════════════════════════════════════════════════
const ROWS = 6, COLS = 5;
let currentRow = 0, currentCol = 0;
let guesses = Array.from({length: ROWS}, () => Array(COLS).fill(''));
let gameOver = false;
const keyMap = {};

// Build board
const board = document.getElementById('board');
for (let r = 0; r < ROWS; r++) {
  const row = document.createElement('div');
  row.className = 'board-row';
  for (let c = 0; c < COLS; c++) {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.id = `tile-${r}-${c}`;
    row.appendChild(tile);
  }
  board.appendChild(row);
}

// Build keyboard
const KEYS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['ENTER','Z','X','C','V','B','N','M','⌫']
];
document.getElementById('keyboard').innerHTML = '';
KEYS.forEach(row => {
  const el = document.createElement('div');
  el.className = 'keyboard-row';
  row.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'key' + (k.length > 1 ? ' wide' : '');
    btn.textContent = k;
    btn.addEventListener('click', () => handleKey(k));
    el.appendChild(btn);
    keyMap[k] = btn;
  });
  document.getElementById('keyboard').appendChild(el);
});

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.altKey || e.metaKey) return;
  if (e.key === 'Enter')     handleKey('ENTER');
  else if (e.key === 'Backspace') handleKey('⌫');
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

function handleKey(k) {
  if (gameOver) return;
  if (k === '⌫')        deleteLetter();
  else if (k === 'ENTER') submitGuess();
  else if (/^[A-Z]$/.test(k) && currentCol < COLS) typeLetter(k);
}

function typeLetter(k) {
  const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
  tile.textContent = k;
  tile.classList.add('filled');
  tile.classList.remove('pop');
  void tile.offsetWidth; // reflow to restart animation
  tile.classList.add('pop');
  guesses[currentRow][currentCol] = k;
  currentCol++;
}

function deleteLetter() {
  if (currentCol === 0) return;
  currentCol--;
  const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
  tile.textContent = '';
  tile.classList.remove('filled', 'pop');
  guesses[currentRow][currentCol] = '';
}

function submitGuess() {
  if (currentCol < COLS) { shakeRow(currentRow); showToast("Not enough letters"); return; }
  revealRow(currentRow, guesses[currentRow].join(''));
}

function revealRow(row, guess) {
  const answer = ANSWER.toUpperCase();
  const result = Array(COLS).fill('absent');
  const letters = guess.split('');

  // Simpler matching strategy:
  // 1. If it matches the exact spot -> Green (correct)
  // 2. If it is in the word anywhere else -> Yellow (present)
  // 3. Otherwise -> Brown (absent)
  letters.forEach((l, i) => {
    if (l === answer[i]) {
      result[i] = 'correct';
    } else if (answer.includes(l)) {
      result[i] = 'present';
    }
  });

  result.forEach((state, col) => {
    const tile = document.getElementById(`tile-${row}-${col}`);
    const delay = col * 320; 

    setTimeout(() => {
      tile.classList.add('flip-out');

      setTimeout(() => {
        tile.classList.remove('flip-out', 'filled', 'correct', 'present', 'absent');
        tile.classList.add(state);

        tile.classList.add('flip-in');
        setTimeout(() => tile.classList.remove('flip-in'), 150);

        updateKey(letters[col], state);
      }, 150);

    }, delay);
  });

  const totalDelay = (COLS - 1) * 320 + 300 + 150;
  setTimeout(() => {
    if (guess === answer) {
      gameOver = true;
      triggerConfetti();
      setTimeout(() => showModal('🎉 You got it!', WIN_MESSAGE), 300);
    } else if (row === ROWS - 1) {
      gameOver = true;
      setTimeout(() => showModal('The answer was…', `"${answer}." "  ${WIN_MESSAGE}" `), 300);
    } else {
      currentRow++;
      currentCol = 0;
    }
  }, totalDelay);
}

function updateKey(letter, state) {
  const btn = keyMap[letter];
  if (!btn) return;
  const priority = { correct: 3, present: 2, absent: 1 };
  const cur = priority[btn.dataset.state] || 0;
  if ((priority[state] || 0) > cur) {
    btn.dataset.state = state;
    btn.className = `key${letter.length > 1 ? ' wide' : ''} ${state}`;
  }
}

function shakeRow(row) {
  for (let c = 0; c < COLS; c++) {
    const t = document.getElementById(`tile-${row}-${c}`);
    t.classList.remove('shake');
    void t.offsetWidth;
    t.classList.add('shake');
    setTimeout(() => t.classList.remove('shake'), 400);
  }
}

function triggerConfetti() {
  confetti({ particleCount: 80, angle: 60,  spread: 70, origin: { x: 0,   y: 0.8 } });
  confetti({ particleCount: 80, angle: 120, spread: 70, origin: { x: 1,   y: 0.8 } });
  confetti({ particleCount: 60, angle: 90,  spread: 60, origin: { x: 0.5, y: 0.6 } });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function showModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').textContent  = body;
  document.getElementById('modal').classList.add('show');
}
</script>
</body>
</html>
