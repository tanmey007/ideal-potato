<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinpoint | Birthday Edition 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
										  
    .pinpoint-container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    /* Pinpoint Grid Style */
    .pinpoint-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .clue-tile {
      background: #fff;
      border: 1.5px solid var(--warm);
      border-radius: 10px;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
		   
						 
					   
						 
      text-align: center;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
								  
								
    }

    /* Unrevealed tile looks like an empty mystery slot */
    .clue-tile.locked {
      background: var(--warm);
      color: var(--mid);
      border-style: dashed;
      font-family: var(--ff-display);
      font-size: 1.1rem;
      opacity: 0.6;
    }

    /* Animation pop when revealed */
    .clue-tile.revealed {
      animation: popIn 0.35s ease-out forwards;
      color: var(--dark);
      border-color: var(--rust-lt);
      box-shadow: 0 4px 12px rgba(44,26,14,0.05);
    }

    @keyframes popIn {
      0% { transform: scale(0.95); opacity: 0.5; }
      100% { transform: scale(1); opacity: 1; }
    }

    .game-controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    .input-group {
      display: flex;
      gap: 8px;
    }
    .guess-input {
      flex: 1;
      padding: 14px;
      border: 1.5px solid var(--warm);
      border-radius: 8px;
      font-family: var(--ff-body);
      font-size: 1rem;
      outline: none;
    }
    .guess-input:focus {
      border-color: var(--rust-lt);
    }
    .guess-counter {
      text-align: center;
      font-size: 0.85rem;
      color: var(--mid);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body class="game-shell">

  <header class="game-header">
    <a href="../index.html" class="back-link">← Back</a>
    <h1>Pinpoint</h1>
    <div style="width: 45px;"></div>
  </header>

  <main class="game-body">
    <div class="pinpoint-container">
      
      <div class="guess-counter" id="guess-counter">
        Clues Revealed: 1 / 5
      </div>

      <!-- The 5 Visual Tiles -->
      <div class="pinpoint-grid" id="pinpoint-grid">
        <div class="clue-tile locked" id="tile-0">?</div>
        <div class="clue-tile locked" id="tile-1">?</div>
        <div class="clue-tile locked" id="tile-2">?</div>
        <div class="clue-tile locked" id="tile-3">?</div>
        <div class="clue-tile locked" id="tile-4">?</div>
      </div>

      <div class="game-controls">
        <div class="input-group">
          <input type="text" id="guess-input" class="guess-input" placeholder="Type your guess..." autocomplete="off">
          <button class="btn" id="submit-btn">Guess</button>
        </div>
        <button class="btn" id="next-clue-btn" style="background: var(--mid); padding: 10px;">Give me another clue</button>
      </div>

    </div>
  </main>

  <!-- Notification Toast -->
  <div class="toast" id="toast">Incorrect guess! Try again.</div>

  <!-- End Game Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Result</h2>
      <p id="modal-desc"></p>
      <button class="btn" onclick="location.reload()">Play Again</button>
    </div>
  </div>

  <script>
    // --- CONFIGURE YOUR QUESTIONS & VALID ANSWERS HERE ---
																			  
    const gameData = {
      // The principal long answer to show in descriptions when winning/losing
      displayAnswer: "People jisne baat karne ke liye tanmey ka phone disconnect kiya gya hai",
      
      // All versions she could enter that you want to instantly accept
      acceptableAnswers: [
        "Disconnect Tanmey call",
        "Ignore Tanmey"
      ],
      
      clues: [
        "Aastiva",
        "Ashutosh",
        "Pragati",
        "Rakesh",
        "Almost everyone at Optum"
      ]
    };

    let currentClueIndex = 0;
    const maxClues = gameData.clues.length;

														  
    const guessInput = document.getElementById('guess-input');
    const submitBtn = document.getElementById('submit-btn');
    const nextClueBtn = document.getElementById('next-clue-btn');
    const guessCounter = document.getElementById('guess-counter');
    const toast = document.getElementById('toast');
    const modalOverlay = document.getElementById('modal-overlay');
    const modalTitle = document.getElementById('modal-title');
    const modalDesc = document.getElementById('modal-desc');

								
    function initGame() {
      // Reveal first clue immediately
      revealNextClue();
    }

    function revealNextClue() {
      if (currentClueIndex < maxClues) {
        const currentTile = document.getElementById(`tile-${currentClueIndex}`);
        if (currentTile) {
          currentTile.classList.remove('locked');
          currentTile.classList.add('revealed');
          currentTile.innerText = gameData.clues[currentClueIndex];
        }
		
											   
															   

        currentClueIndex++;
        updateCounter();

        // Hide button if no more clues can be explicitly given
        if (currentClueIndex === maxClues) {
          nextClueBtn.style.display = 'none';
        }
      }
    }

    function updateCounter() {
      guessCounter.innerText = `Clues Revealed: ${currentClueIndex} / ${maxClues}`;
    }

    function showToast(message) {
      toast.innerText = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function handleGuess() {
      const userGuess = guessInput.value.trim().toLowerCase();
      if (!userGuess) return;

      // Check input against list of matches
      const isCorrect = gameData.acceptableAnswers.some(ans => ans.trim().toLowerCase() === userGuess);

      if (isCorrect) {
        modalTitle.innerText = "You Nailed It! 🎉";
        modalDesc.innerText = `Exactly! The answer was "${gameData.displayAnswer}". Caught it on clue ${currentClueIndex}/${maxClues}!`;
        modalOverlay.classList.add('show');
      } else {
					  
        guessInput.value = '';
        
        if (currentClueIndex < maxClues) {
          showToast("Wrong guess! Revealing next clue...");
          revealNextClue();
        } else {
          // Final guess failure state
          modalTitle.innerText = "So close! 💔";
          modalDesc.innerText = `Aap guess nahi kar paaye. Real answer was: "${gameData.displayAnswer}".`;
          modalOverlay.classList.add('show');
        }
      }
    }

    // Interactive Action Listeners
    submitBtn.addEventListener('click', handleGuess);
    nextClueBtn.addEventListener('click', revealNextClue);
					   
	   
    guessInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleGuess();
    });

						 
    initGame();
  </script>
</body>
</html>
